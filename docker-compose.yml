version: '3.9'

# ─── Shared network ──────────────────────────────────────────────────────────
networks:
  gixbee_net:
    driver: bridge

# ─── Named volumes ───────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gixbee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gixbee_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NOT exposed to host in production — only accessible inside gixbee_net
    # Uncomment below only for local development debugging:
    # ports:
    #   - "5432:5432"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gixbee_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - gixbee_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NOT exposed to host in production
    # ports:
    #   - "6379:6379"

  # ── NestJS Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gixbee_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override hosts to use Docker service names (not localhost)
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      PORT: 3000
    volumes:
      # Persist uploaded files across container restarts
      - uploads_data:/app/uploads
    networks:
      - gixbee_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gixbee_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # mount your SSL certs here
      - uploads_data:/app/uploads:ro         # serve static uploads
    networks:
      - gixbee_net
    depends_on:
      - backend
