version: '3.9'

# ─── Shared network ──────────────────────────────────────────────────────────
networks:
  gixbee_net:
    driver: bridge

# ─── Named volumes ───────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gixbee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gixbee123
      POSTGRES_DB: gixbee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gixbee_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gixbee"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gixbee_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - gixbee_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gixbee_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    networks:
      - gixbee_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ── Admin Panel (Angular) ──────────────────────────────────────────────────
  admin:
    build:
      context: ./super-admin-web
      dockerfile: Dockerfile
    container_name: gixbee_admin
    restart: unless-stopped
    networks:
      - gixbee_net
    depends_on:
      - backend
    ports:
      - "80:80"
