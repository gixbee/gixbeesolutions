worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;   # allow up to 20MB file uploads

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── Upstream — NestJS backend ──────────────────────────────────────────
    upstream gixbee_backend {
        server backend:3000;   # Docker service name, not localhost
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge (if using Certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            # return 301 https://$host$request_uri;
            root /usr/share/nginx/html;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        # listen 443 ssl;
        server_name _;

        # SSL certificates (Commented out for local dev)
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # ── REST API ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://gixbee_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── WebSockets (Socket.io) ─────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://gixbee_backend/socket.io/;
            proxy_http_version 1.1;

            # Critical headers for WebSocket upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;

            proxy_read_timeout  3600s;    # keep WS connections alive for 1hr
            proxy_send_timeout  3600s;
        }

        # ── Static file uploads ────────────────────────────────────────────
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Health check (no auth required) ───────────────────────────────
        location /health {
            proxy_pass http://gixbee_backend/health;
            access_log off;
        }
    }
}
