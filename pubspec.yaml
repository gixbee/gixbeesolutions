name: gixbee
description: "Gixbee: The Skill Intelligence Network"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking & Real-time
  dio: ^5.4.3
  socket_io_client: ^2.0.3

  # Firebase — FCM push notifications only
  # firebase_auth intentionally excluded — auth is handled by Supabase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0

  # Local notifications (foreground display on Android)
  flutter_local_notifications: ^17.2.2

  # Auth (Supabase handles OTP/session)
  supabase_flutter: ^2.12.4

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Maps & Location
  url_launcher: ^6.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Payments
  razorpay_flutter: ^1.3.7

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  carousel_slider: ^5.0.0
  glass_kit: ^3.0.0
  cupertino_icons: ^1.0.8
  dynamic_color: ^1.7.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
